services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: prism-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_SCALE
        sync: false
      - key: SARVAM_API_KEY
        sync: false

  # ─── Dashboard (Next.js) ──────────────────────────────────────────────────────
  - type: web
    name: prism-dashboard
    runtime: node
    rootDir: apps/dashboard
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false

  # ─── Landing (Next.js) ───────────────────────────────────────────────────────
  - type: web
    name: prism-landing
    runtime: node
    rootDir: apps/landing
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
