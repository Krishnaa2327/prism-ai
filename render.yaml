services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: prism-backend
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: prism-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_SCALE
        sync: false
      - key: SARVAM_API_KEY
        sync: false

  # ─── Landing Page ─────────────────────────────────────────────────────────────
  - type: web
    name: prism-landing
    runtime: static
    rootDir: apps/landing
    buildCommand: npm install && npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # ─── Dashboard ────────────────────────────────────────────────────────────────
  - type: web
    name: prism-dashboard
    runtime: static
    rootDir: apps/dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: prism-db
    plan: free
    databaseName: prism
    user: prism
